spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6370  # non-default; tests mock Redis

  cache:
    type: simple  # in-memory cache for tests (no Redis needed)

jwt:
  secret: testSecretKeyForJwtThatIsAtLeast256BitsLongForTesting!!
  expiration: 3600000
  refresh-expiration: 86400000

logging:
  level:
    com.cinemax: WARN
    org.springframework: WARN
